<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Contact | AN JI HUN Portfolio</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;700&family=Noto+Sans+KR:wght@300;400;500;700&family=Orbitron:wght@400;500;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body class="contact-page">
    <div class="layout contact-layout">
      <aside class="sidebar about-sidebar">
        <a
          class="brand about-brand"
          href="index.html"
          aria-label="메인 페이지로 이동"
        >
          <p class="brand-top">AN JI HUN</p>
          <p class="brand-bottom">Portfolio</p>
        </a>

        <nav class="side-nav about-nav">
          <a href="about.html">About</a>
          <a class="is-active" href="contact.html">Contact</a>
        </nav>

        <section class="project-list about-project-list">
          <h2><a class="project-list-title-link" href="project.html">Projects</a></h2>
          <ul>
            <li><a href="fluire.html">Fluire</a></li>
            <li><a href="illumi-stand.html">Illumi Stand</a></li>
            <li><a href="project-03.html">Content</a></li>
            <li><a href="project-04.html">Content</a></li>
            <li><a href="project-05.html">Content</a></li>
            <li><a href="project-06.html">Content</a></li>
            <li><a href="project-07.html">Content</a></li>
            <li><a href="project-08.html">Content</a></li>
          </ul>
        </section>
      </aside>

      <main class="contact-main">
        <section class="contact-panel">
          <h1>Contact</h1>

          <div class="contact-meta">
            <p><span>Email.</span> <a href="mailto:jihoon030812@naver.com">jihoon030812@naver.com</a></p>
            <p><span>Tel.</span> <a href="tel:01038033051">010-3803-3051</a></p>
          </div>

          <form class="contact-form" id="contactForm">
            <label for="contact-name">Name*</label>
            <input
              id="contact-name"
              name="name"
              type="text"
              placeholder="이름을 입력해주세요."
              required
            />

            <label for="contact-email">Email Address*</label>
            <input
              id="contact-email"
              name="email"
              type="email"
              placeholder="이메일을 입력해주세요."
              required
            />

            <label for="contact-message">Message*</label>
            <textarea
              id="contact-message"
              name="message"
              placeholder="텍스트를 입력해주세요."
              required
            ></textarea>

            <div class="contact-actions">
              <button type="submit">Send</button>
            </div>
          </form>
        </section>
      </main>
    </div>

    <script>
      const contactForm = document.getElementById("contactForm");

      contactForm.addEventListener("submit", function (event) {
        event.preventDefault();

        const name = contactForm.name.value.trim();
        const email = contactForm.email.value.trim();
        const message = contactForm.message.value.trim();

        if (!name || !email || !message) {
          alert("모든 항목을 입력해주세요.");
          return;
        }

        const subject = encodeURIComponent("[Portfolio Contact] " + name);
        const body = encodeURIComponent(
          "Name: " +
            name +
            "\nEmail: " +
            email +
            "\n\nMessage:\n" +
            message
        );

        window.location.href =
          "mailto:jihoon030812@naver.com?subject=" + subject + "&body=" + body;
      });
    </script>
  </body>
</html>
